{% extends "base.html" %}

{% block title %}Editar Producto{% endblock %}

{% block content %}
<div class="content-header">
    <h2>✏️ Editar Producto</h2>
    <p class="subtitle">Actualiza los datos de: <strong>{{ producto[1] }}</strong></p>
</div>

<form method="post" class="form">
    <div class="form-group">
        <label>Nombre</label>
        <input type="text" value="{{ producto[1] }}" class="form-input" disabled>
        <span class="form-hint">El nombre no se puede modificar</span>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" name="cantidad" required min="0" value="{{ producto[2] }}" class="form-input">
        </div>

        <div class="form-group">
            <label for="precio">Precio Unitario ($)</label>
            <input type="number" id="precio" name="precio" required min="0" step="0.01" value="{{ producto[3] }}" class="form-input">
        </div>
    </div>

    <div class="form-actions">
        <a href="/" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">💾 Guardar Cambios</button>
    </div>
</form>
{% endblock %}
