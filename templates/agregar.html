{% extends "base.html" %}

{% block title %}Agregar Producto{% endblock %}

{% block content %}
<div class="content-header">
    <h2>➕ Agregar Producto</h2>
    <p class="subtitle">Ingresa los datos del nuevo producto</p>
</div>

<form method="post" class="form">
    <div class="form-group">
        <label for="nombre">Nombre del Producto</label>
        <input type="text" id="nombre" name="nombre" required placeholder="Ej: Laptop Dell XPS 15" class="form-input">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="cantidad">Cantidad</label>
            <input type="number" id="cantidad" name="cantidad" required min="0" value="0" class="form-input">
        </div>

        <div class="form-group">
            <label for="precio">Precio Unitario ($)</label>
            <input type="number" id="precio" name="precio" required min="0" step="0.01" value="0.00" class="form-input">
        </div>
    </div>

    <div class="form-actions">
        <a href="/" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-primary">➕ Agregar Producto</button>
    </div>
</form>
{% endblock %}
